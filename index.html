<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Beck Lande</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">

<style>
:root { --bg:#0a0a0a; --text:#f5f5f5; --accent:#22c55e; }
*{box-sizing:border-box}
html,body{height:100%;margin:0}

body{
  font-family:Inter,system-ui,sans-serif;
  color:var(--text);
  display:flex;align-items:center;justify-content:center;
  background:
    linear-gradient(rgba(255,255,255,0.03) 1px,transparent 1px),
    linear-gradient(90deg,rgba(255,255,255,0.03) 1px,transparent 1px),
    radial-gradient(circle at 30% 30%,rgba(34,197,94,0.05),transparent 40%),
    var(--bg);
  background-size:24px 24px,24px 24px,auto;
}

main{text-align:center}

h1{
  margin:0;
  font-size:clamp(3rem,8vw,6rem);
  font-weight:900;
  letter-spacing:-0.04em;
  transition:text-shadow .3s ease, transform .25s ease;
}

h1:hover{
  text-shadow:0 0 12px rgba(34,197,94,.25);
  transform:translateY(-1px);
}

canvas{position:fixed;inset:0;display:none;background:#0a0a0a}
#score{position:fixed;top:16px;right:20px;font-size:14px;color:#aaa;display:none}
#gameover{
  position:fixed;
  inset:0;
  display:none;
  align-items:center;
  justify-content:center;
  flex-direction:column;
  background:rgba(0,0,0,0.12);
  color:white;
  font-size:24px;
  opacity:0;
  transition:opacity .28s ease;
}

#gameover.show {
  opacity:1;
}

#gameover .panel {
  padding:18px 22px;
  border:1px solid rgba(255,255,255,0.14);
  background:rgba(10,10,10,0.78);
  backdrop-filter:blur(6px);
  border-radius:16px;
  text-align:center;
  transform:translateY(12px) scale(.98);
  transition:transform .28s ease, opacity .28s ease;
  opacity:0;
}

#gameover.show .panel {
  transform:translateY(0) scale(1);
  opacity:1;
}

button{
  margin-top:16px;
  padding:10px 16px;
  background:#222;
  border:1px solid #444;
  color:white;
  cursor:pointer;
}

</style>
</head>
<body>

<main>
  <h1 id="title">Beck Lande</h1>
</main>

<canvas id="game"></canvas>
<div id="score">0</div>
<div id="gameover">
  <div>Game Over</div>
  <button onclick="restart()">Play Again</button>
</div>

<script>
let keyBuffer = "";
let taps = 0;
let gameStarted = false;
let canvas, ctx, leoImg, loop;
let score = 0;
let best = Number(localStorage.getItem("leoRunnerBest") || 0);
let gameState = "idle";

const titleEl = document.getElementById("title");
const scoreEl = document.getElementById("score");
const gameOverEl = document.getElementById("gameover");
const canvasEl = document.getElementById("game");

const groundHeight = 84;
const player = {
  x: 88,
  y: 0,
  w: 64,
  h: 64,
  vy: 0,
  jumpPower: 15.5,
  gravity: 0.72
};

let obstacles = [];
let particles = [];
let spawnTimer = 0;
let speed = 7;
let baseY = 0;
let gameOverTimer = 0;
let crashFlash = 0;
let leoRotation = 0;
let impactX = 0;
let shake = 0;

window.addEventListener("keydown", e => {
  keyBuffer += e.key.toLowerCase();
  if (keyBuffer.includes("leo")) revealGame();
  keyBuffer = keyBuffer.slice(-10);

  if (e.code === "Space" || e.code === "ArrowUp") {
    e.preventDefault();
    handleAction();
  }

  if (e.key.toLowerCase() === "r" && gameState === "gameover") {
    restart();
  }
});

titleEl.addEventListener("click", () => {
  taps++;
  if (taps === 3) revealGame();
  setTimeout(() => taps = 0, 500);
});

window.addEventListener("touchstart", e => {
  if (!gameStarted) return;
  e.preventDefault();
  handleAction();
}, { passive: false });

window.addEventListener("resize", () => {
  if (!gameStarted) return;
  resizeGame();
});

function revealGame() {
  if (gameStarted) return;
  gameStarted = true;
  canvas = canvasEl;
  ctx = canvas.getContext("2d");
  canvas.style.display = "block";
  scoreEl.style.display = "block";
  titleEl.parentElement.style.opacity = "0";

  leoImg = new Image();
  const spriteCandidates = ["leo_sprite_v2.png", "leo_sprite_pro.png", "leo.png"];
  let spriteIndex = 0;

  function tryNextSprite() {
    if (spriteIndex >= spriteCandidates.length) {
      console.warn("Leo sprite failed to load. Checked:", spriteCandidates);
      initGame();
      run();
      return;
    }
    leoImg.src = spriteCandidates[spriteIndex++];
  }

  leoImg.onload = () => {
    initGame();
    run();
  };

  leoImg.onerror = () => {
    tryNextSprite();
  };

  tryNextSprite();
}

function resizeGame() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
  baseY = canvas.height - groundHeight;
  if (player.y === 0 || player.y > baseY - player.h) {
    player.y = baseY - player.h;
  }
}

function initGame() {
  resizeGame();
  restart();
}

function restart() {
  score = 0;
  speed = 7;
  spawnTimer = 0;
  obstacles = [];
  particles = [];
  player.vy = 0;
  player.y = baseY - player.h;
  gameState = "running";
  gameOverTimer = 0;
  crashFlash = 0;
  leoRotation = 0;
  impactX = 0;
  shake = 0;
  gameOverEl.classList.remove("show");
  gameOverEl.style.display = "none";
  updateScore();
}

function handleAction() {
  if (!gameStarted) return;
  if (gameState === "gameover") {
    restart();
    return;
  }
  jump();
}

function jump() {
  const onGround = player.y >= baseY - player.h - 0.5;
  if (!onGround) return;
  player.vy = -player.jumpPower;
}

function spawnObstacle() {
  const h = 28 + Math.random() * 22;
  const w = 18 + Math.random() * 16;
  obstacles.push({
    x: canvas.width + 20,
    y: baseY - h,
    w,
    h
  });
}

function addDust() {
  particles.push({
    x: player.x + player.w * 0.3,
    y: baseY - 6,
    r: 2 + Math.random() * 3,
    vx: -1 - Math.random() * 2,
    vy: -0.5 - Math.random(),
    a: 0.28 + Math.random() * 0.15
  });
}

function update() {
  if (gameState === "gameover") {
    gameOverTimer += 1;
    player.vy += player.gravity * 0.9;
    player.y += player.vy;
    leoRotation += 0.16;
    crashFlash = Math.max(0, crashFlash - 0.022);
    shake = Math.max(0, shake - 0.55);
    if (player.y > canvas.height + 120) {
      player.y = canvas.height + 120;
      player.vy = 0;
    }

    for (let i = particles.length - 1; i >= 0; i--) {
      const p = particles[i];
      p.x += p.vx;
      p.y += p.vy;
      p.a -= 0.02;
      if (p.a <= 0) particles.splice(i, 1);
    }
    return;
  }

  if (gameState !== "running") return;

  player.vy += player.gravity;
  player.y += player.vy;

  if (player.y >= baseY - player.h) {
    if (player.vy > 1) addDust();
    player.y = baseY - player.h;
    player.vy = 0;
  }

  spawnTimer--;
  if (spawnTimer <= 0) {
    spawnObstacle();
    spawnTimer = Math.max(48, 92 - speed * 4 + Math.random() * 24);
  }

  for (let i = obstacles.length - 1; i >= 0; i--) {
    const o = obstacles[i];
    o.x -= speed;

    const hitbox = {
      x: player.x + 12,
      y: player.y + 10,
      w: player.w - 24,
      h: player.h - 18
    };

    if (
      hitbox.x < o.x + o.w &&
      hitbox.x + hitbox.w > o.x &&
      hitbox.y < o.y + o.h &&
      hitbox.y + hitbox.h > o.y
    ) {
      gameOver();
    }

    if (o.x + o.w < 0) {
      obstacles.splice(i, 1);
      score++;
      if (score > best) {
        best = score;
        localStorage.setItem("leoRunnerBest", String(best));
      }
      updateScore();
    }
  }

  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.x += p.vx;
    p.y += p.vy;
    p.a -= 0.015;
    if (p.a <= 0) particles.splice(i, 1);
  }

  speed += 0.0025;
}

function updateScore() {
  scoreEl.textContent = `Score ${score} · Best ${best}`;
}

function gameOver() {
  if (gameState === "gameover") return;
  gameState = "gameover";
  player.vy = -10;
  crashFlash = 0.42;
  leoRotation = -0.15;
  impactX = player.x + player.w * 0.5;
  shake = 8;

  for (let i = 0; i < 24; i++) {
    particles.push({
      x: player.x + player.w * 0.5,
      y: player.y + player.h * 0.58,
      r: 2 + Math.random() * 5,
      vx: -5 + Math.random() * 10,
      vy: -4 + Math.random() * 4,
      a: 0.5 + Math.random() * 0.35
    });
  }

  setTimeout(() => {
    if (gameState !== "gameover") return;
    gameOverEl.innerHTML = `<div class="panel"><div>Game Over</div><button onclick="restart()">Play Again</button></div>`;
    gameOverEl.style.display = "flex";
    requestAnimationFrame(() => gameOverEl.classList.add("show"));
  }, 700);
}

function drawBackground() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  const offsetX = shake > 0 ? (Math.random() - 0.5) * shake : 0;
  const offsetY = shake > 0 ? (Math.random() - 0.5) * shake * 0.35 : 0;
  ctx.save();
  ctx.translate(offsetX, offsetY);

  const sky = ctx.createLinearGradient(0, 0, 0, canvas.height);
  sky.addColorStop(0, "#0a0a0a");
  sky.addColorStop(1, "#101312");
  ctx.fillStyle = sky;
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  ctx.globalAlpha = 0.08;
  for (let x = 0; x < canvas.width; x += 24) {
    ctx.fillStyle = "#ffffff";
    ctx.fillRect(x, 0, 1, canvas.height);
  }
  for (let y = 0; y < canvas.height; y += 24) {
    ctx.fillStyle = "#ffffff";
    ctx.fillRect(0, y, canvas.width, 1);
  }
  ctx.globalAlpha = 1;

  ctx.fillStyle = "#181818";
  ctx.fillRect(0, baseY, canvas.width, groundHeight);
  ctx.fillStyle = "rgba(34,197,94,0.35)";
  ctx.fillRect(0, baseY, canvas.width, 2);

  if (gameState === "gameover") {
    const burst = ctx.createRadialGradient(impactX, baseY - 16, 0, impactX, baseY - 16, 120);
    burst.addColorStop(0, "rgba(255,255,255,0.12)");
    burst.addColorStop(1, "rgba(255,255,255,0)");
    ctx.fillStyle = burst;
    ctx.beginPath();
    ctx.arc(impactX, baseY - 16, 120, 0, Math.PI * 2);
    ctx.fill();
  }
}

function drawPlayer() {
  const squash = player.y >= baseY - player.h - 0.5 && gameState === "running"
    ? Math.min(1.04, 1 + speed * 0.002)
    : 1;
  const drawW = player.w * squash;
  const drawH = player.h / squash;
  const drawX = player.x - (drawW - player.w) / 2;
  const drawY = player.y + (player.h - drawH);

  ctx.save();
  ctx.translate(drawX + drawW / 2, drawY + drawH / 2);
  if (gameState === "gameover") {
    ctx.rotate(leoRotation);
  }

  if (leoImg && leoImg.complete && leoImg.naturalWidth > 0) {
    ctx.drawImage(leoImg, -drawW / 2, -drawH / 2, drawW, drawH);
  } else {
    ctx.fillStyle = "#f97316";
    ctx.font = "700 14px Inter, sans-serif";
    ctx.textAlign = "center";
    ctx.textBaseline = "middle";
    ctx.beginPath();
    ctx.arc(0, 0, 22, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = "white";
    ctx.fillText("L", 0, 1);
  }
  ctx.restore();
}

function drawObstacles() {
  ctx.fillStyle = "#22c55e";
  for (const o of obstacles) {
    ctx.fillRect(o.x, o.y, o.w, o.h);
    ctx.fillStyle = "rgba(255,255,255,0.08)";
    ctx.fillRect(o.x, o.y, o.w, 3);
    ctx.fillStyle = "#22c55e";
  }
}

function drawParticles() {
  for (const p of particles) {
    ctx.fillStyle = `rgba(255,255,255,${p.a})`;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
    ctx.fill();
  }
}

function drawHint() {
  if (score > 0 || gameState !== "running") return;
  ctx.fillStyle = "rgba(255,255,255,0.65)";
  ctx.font = "16px Inter, sans-serif";
  ctx.textAlign = "center";
  ctx.fillText("Tap or press space to jump", canvas.width / 2, 52);
}

function render() {
  drawBackground();
  drawParticles();
  drawObstacles();
  drawPlayer();
  drawHint();

  if (crashFlash > 0) {
    ctx.fillStyle = `rgba(255,255,255,${crashFlash})`;
    ctx.fillRect(-40, -40, canvas.width + 80, canvas.height + 80);
  }

  ctx.restore();
}

function run() {
  update();
  render();
  loop = requestAnimationFrame(run);
}

window.restart = restart;
</script>

</body>
</html>

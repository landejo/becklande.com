<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Beck Lande</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">

<style>
:root { --bg:#0a0a0a; --text:#f5f5f5; --accent:#22c55e; }
*{box-sizing:border-box}
html,body{height:100%;margin:0}

body{
  font-family:Inter,system-ui,sans-serif;
  color:var(--text);
  display:flex;align-items:center;justify-content:center;
  background:
    linear-gradient(rgba(255,255,255,0.03) 1px,transparent 1px),
    linear-gradient(90deg,rgba(255,255,255,0.03) 1px,transparent 1px),
    radial-gradient(circle at 30% 30%,rgba(34,197,94,0.05),transparent 40%),
    var(--bg);
  background-size:24px 24px,24px 24px,auto;
}

main{text-align:center}

h1{
  margin:0;
  font-size:clamp(3rem,8vw,6rem);
  font-weight:900;
  letter-spacing:-0.04em;
  transition:text-shadow .3s ease, transform .25s ease;
}

h1:hover{
  text-shadow:0 0 12px rgba(34,197,94,.25);
  transform:translateY(-1px);
}

canvas{position:fixed;inset:0;display:none;background:#0a0a0a}
#score{position:fixed;top:16px;right:20px;font-size:14px;color:#aaa;display:none}
#gameover{
  position:fixed;
  inset:0;
  display:none;
  align-items:center;
  justify-content:center;
  flex-direction:column;
  background:rgba(0,0,0,0.12);
  color:white;
  font-size:24px;
  opacity:0;
  transition:opacity .28s ease;
}

#gameover.show {
  opacity:1;
}

#gameover .panel {
  padding:18px 22px;
  border:1px solid rgba(255,255,255,0.14);
  background:rgba(10,10,10,0.78);
  backdrop-filter:blur(6px);
  border-radius:16px;
  text-align:center;
  transform:translateY(12px) scale(.98);
  transition:transform .28s ease, opacity .28s ease;
  opacity:0;
}

#gameover.show .panel {
  transform:translateY(0) scale(1);
  opacity:1;
}

button{
  margin-top:16px;
  padding:10px 16px;
  background:#222;
  border:1px solid #444;
  color:white;
  cursor:pointer;
}

</style>
</head>
<body>

<main>
  <h1 id="title">Beck Lande</h1>
</main>

<canvas id="game"></canvas>
<div id="score">0</div>
<div id="gameover">
  <div>Game Over</div>
  <button onclick="restart()">Play Again</button>
</div>

<script>
(() => {
  const titleEl = document.getElementById("title");
  const scoreEl = document.getElementById("score");
  const gameOverEl = document.getElementById("gameover");
  const canvas = document.getElementById("game");
  const ctx = canvas.getContext("2d");

  let keyBuffer = "";
  let taps = 0;
  let revealed = false;
  let animationId = null;
  let audioCtx = null;
  let musicTimer = null;
  let musicStep = 0;

  const state = {
    running: false,
    over: false,
    width: 0,
    height: 0,
    groundY: 0,
    speed: 7,
    score: 0,
    best: Number(localStorage.getItem("leoRunnerBest") || 0),
    spawnTimer: 70,
    shake: 0,
    flash: 0,
    player: {
      x: 92,
      y: 0,
      w: 64,
      h: 64,
      vy: 0,
      gravity: 0.78,
      jump: 15.2,
      rotation: 0
    },
    obstacles: [],
    particles: []
  };

  const leoImg = new Image();
  let spriteReady = false;

  function loadSprite() {
    const candidates = ["leo_sprite_v2.png", "leo_sprite_pro.png", "leo.png"];
    let i = 0;
    leoImg.onload = () => { spriteReady = true; };
    leoImg.onerror = () => {
      i += 1;
      if (i < candidates.length) leoImg.src = candidates[i];
    };
    leoImg.src = candidates[i];
  }
  loadSprite();

  function ensureAudio() {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    if (audioCtx.state === "suspended") audioCtx.resume();
  }

  function beep(freq, duration, type = "square", volume = 0.02, slideTo = null) {
    if (!audioCtx) return;
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.type = type;
    osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
    if (slideTo) osc.frequency.exponentialRampToValueAtTime(slideTo, audioCtx.currentTime + duration);
    gain.gain.setValueAtTime(volume, audioCtx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration);
    osc.connect(gain);
    gain.connect(audioCtx.destination);
    osc.start();
    osc.stop(audioCtx.currentTime + duration);
  }

  function playJumpSound() { beep(420, 0.08, "square", 0.035, 620); }
  function playCrashSound() { beep(180, 0.20, "sawtooth", 0.06, 70); }

  function playMusicTick() {
    if (!audioCtx || !state.running || state.over) return;
    const leadA = [330, 392, 440, 523, 440, 392, 330, 392];
    const leadB = [494, 523, 587, 659, 587, 523, 494, 440];
    const bass = [110, 110, 147, 147, 165, 147, 110, 98];
    const harmony = [220, 247, 294, 330, 294, 247, 220, 196];
    const section = Math.floor(musicStep / 16) % 2;
    const pattern = section === 0 ? leadA : leadB;
    const i = musicStep % 8;
    const boost = Math.min(0.012, Math.max(0, (state.speed - 7) * 0.0009));

    beep(pattern[i], 0.11, "square", 0.022 + boost);
    if (musicStep % 2 === 0) beep(bass[i], 0.18, "triangle", 0.018 + boost * 0.7);
    if (musicStep % 4 === 1 || musicStep % 4 === 3) beep(harmony[i], 0.06, "square", 0.01 + boost * 0.3);
    if (musicStep % 2 === 1) beep(1200, 0.02, "square", 0.007 + boost * 0.4, 900);
    if (musicStep % 8 === 0) beep(82, 0.22, "sawtooth", 0.01 + boost * 0.2, 70);
    musicStep += 1;
  }

  function startMusic() {
    stopMusic();
    musicStep = 0;
    musicTimer = setInterval(playMusicTick, 155);
  }

  function stopMusic() {
    if (musicTimer) {
      clearInterval(musicTimer);
      musicTimer = null;
    }
  }

  function resize() {
    state.width = window.innerWidth;
    state.height = window.innerHeight;
    canvas.width = state.width;
    canvas.height = state.height;
    state.groundY = state.height - 86;
    if (!state.running || state.player.y === 0 || state.player.y > state.groundY - state.player.h) {
      state.player.y = state.groundY - state.player.h;
    }
  }

  function updateScore() {
    scoreEl.textContent = `Score ${state.score} · Best ${state.best}`;
  }

  function revealGame() {
    if (revealed) return;
    revealed = true;
    ensureAudio();
    resize();
    canvas.style.display = "block";
    scoreEl.style.display = "block";
    titleEl.parentElement.style.opacity = "0";
    restart();
    if (!animationId) loop();
  }

  function restart() {
    state.running = true;
    state.over = false;
    state.speed = 7;
    state.score = 0;
    state.spawnTimer = 70;
    state.shake = 0;
    state.flash = 0;
    state.obstacles = [];
    state.particles = [];
    state.player.vy = 0;
    state.player.rotation = 0;
    state.player.y = state.groundY - state.player.h;
    gameOverEl.classList.remove("show");
    gameOverEl.style.display = "none";
    updateScore();
    startMusic();
  }

  function jump() {
    const p = state.player;
    const onGround = p.y >= state.groundY - p.h - 0.5;
    if (!onGround || state.over) return;
    p.vy = -p.jump;
    playJumpSound();
  }

  function handleAction() {
    ensureAudio();
    if (!revealed) return;
    if (state.over) {
      restart();
      return;
    }
    jump();
  }

  function spawnObstacle() {
    const h = 28 + Math.random() * 22;
    const w = 18 + Math.random() * 16;
    state.obstacles.push({ x: state.width + 20, y: state.groundY - h, w, h });
  }

  function addImpactParticles() {
    for (let i = 0; i < 22; i++) {
      state.particles.push({
        x: state.player.x + state.player.w * 0.5,
        y: state.player.y + state.player.h * 0.6,
        r: 2 + Math.random() * 4,
        vx: -4 + Math.random() * 8,
        vy: -4 + Math.random() * 4,
        a: 0.45 + Math.random() * 0.25
      });
    }
  }

  function gameOver() {
    if (state.over) return;
    state.over = true;
    state.running = false;
    state.player.vy = -8.5;
    state.player.rotation = -0.15;
    state.shake = 8;
    state.flash = 0.35;
    addImpactParticles();
    stopMusic();
    playCrashSound();
    setTimeout(() => {
      if (!state.over) return;
      gameOverEl.innerHTML = '<div class="panel"><div>Game Over</div><button onclick="restartGameFromButton()">Play Again</button></div>';
      gameOverEl.style.display = "flex";
      requestAnimationFrame(() => gameOverEl.classList.add("show"));
    }, 650);
  }

  window.restartGameFromButton = restart;

  function update() {
    const p = state.player;

    if (state.over) {
      p.vy += p.gravity * 0.9;
      p.y += p.vy;
      p.rotation += 0.14;
      state.shake = Math.max(0, state.shake - 0.5);
      state.flash = Math.max(0, state.flash - 0.02);
      for (let i = state.particles.length - 1; i >= 0; i--) {
        const part = state.particles[i];
        part.x += part.vx;
        part.y += part.vy;
        part.a -= 0.018;
        if (part.a <= 0) state.particles.splice(i, 1);
      }
      return;
    }

    p.vy += p.gravity;
    p.y += p.vy;
    if (p.y >= state.groundY - p.h) {
      p.y = state.groundY - p.h;
      p.vy = 0;
      p.rotation = 0;
    } else {
      p.rotation = Math.max(-0.35, Math.min(0.45, p.vy * 0.03));
    }

    state.spawnTimer -= 1;
    if (state.spawnTimer <= 0) {
      spawnObstacle();
      state.spawnTimer = Math.max(42, 92 - state.speed * 4 + Math.random() * 24);
    }

    for (let i = state.obstacles.length - 1; i >= 0; i--) {
      const o = state.obstacles[i];
      o.x -= state.speed;
      const hitbox = { x: p.x + 12, y: p.y + 10, w: p.w - 24, h: p.h - 18 };
      if (hitbox.x < o.x + o.w && hitbox.x + hitbox.w > o.x && hitbox.y < o.y + o.h && hitbox.y + hitbox.h > o.y) {
        gameOver();
        break;
      }
      if (o.x + o.w < 0) {
        state.obstacles.splice(i, 1);
        state.score += 1;
        if (state.score > state.best) {
          state.best = state.score;
          localStorage.setItem("leoRunnerBest", String(state.best));
        }
        updateScore();
      }
    }

    for (let i = state.particles.length - 1; i >= 0; i--) {
      const part = state.particles[i];
      part.x += part.vx;
      part.y += part.vy;
      part.a -= 0.012;
      if (part.a <= 0) state.particles.splice(i, 1);
    }

    state.speed += 0.0023;
  }

  function drawBackground() {
    const dx = state.shake > 0 ? (Math.random() - 0.5) * state.shake : 0;
    const dy = state.shake > 0 ? (Math.random() - 0.5) * state.shake * 0.35 : 0;
    ctx.save();
    ctx.translate(dx, dy);

    const sky = ctx.createLinearGradient(0, 0, 0, state.height);
    sky.addColorStop(0, "#0a0a0a");
    sky.addColorStop(1, "#101312");
    ctx.fillStyle = sky;
    ctx.fillRect(0, 0, state.width, state.height);

    ctx.fillStyle = "rgba(255,255,255,0.06)";
    for (let x = 0; x < state.width; x += 24) ctx.fillRect(x, 0, 1, state.height);
    for (let y = 0; y < state.height; y += 24) ctx.fillRect(0, y, state.width, 1);

    ctx.fillStyle = "#1a1a1a";
    ctx.fillRect(0, state.groundY, state.width, 86);
    ctx.fillStyle = "rgba(34,197,94,0.32)";
    ctx.fillRect(0, state.groundY, state.width, 2);
  }

  function drawObstacles() {
    ctx.fillStyle = "#22c55e";
    for (const o of state.obstacles) {
      ctx.fillRect(o.x, o.y, o.w, o.h);
      ctx.fillStyle = "rgba(255,255,255,0.08)";
      ctx.fillRect(o.x, o.y, o.w, 3);
      ctx.fillStyle = "#22c55e";
    }
  }

  function drawParticles() {
    for (const part of state.particles) {
      ctx.fillStyle = `rgba(255,255,255,${part.a})`;
      ctx.beginPath();
      ctx.arc(part.x, part.y, part.r, 0, Math.PI * 2);
      ctx.fill();
    }
  }

  function drawPlayer() {
    const p = state.player;
    ctx.save();
    ctx.translate(p.x + p.w / 2, p.y + p.h / 2);
    ctx.rotate(p.rotation);
    if (spriteReady && leoImg.complete && leoImg.naturalWidth > 0) {
      ctx.drawImage(leoImg, -p.w / 2, -p.h / 2, p.w, p.h);
    } else {
      ctx.fillStyle = "#f97316";
      ctx.beginPath();
      ctx.arc(0, 0, 22, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = "white";
      ctx.font = "700 14px Inter, sans-serif";
      ctx.textAlign = "center";
      ctx.textBaseline = "middle";
      ctx.fillText("L", 0, 1);
    }
    ctx.restore();
  }

  function drawHint() {
    if (state.score > 0 || state.over) return;
    ctx.fillStyle = "rgba(255,255,255,0.7)";
    ctx.font = "16px Inter, sans-serif";
    ctx.textAlign = "center";
    ctx.fillText("Tap or press space to jump", state.width / 2, 52);
  }

  function render() {
    ctx.clearRect(0, 0, state.width, state.height);
    drawBackground();
    drawObstacles();
    drawParticles();
    drawPlayer();
    drawHint();
    if (state.flash > 0) {
      ctx.fillStyle = `rgba(255,255,255,${state.flash})`;
      ctx.fillRect(-40, -40, state.width + 80, state.height + 80);
    }
    ctx.restore();
  }

  function loop() {
    update();
    render();
    animationId = requestAnimationFrame(loop);
  }

  window.addEventListener("keydown", (e) => {
    keyBuffer += e.key.toLowerCase();
    if (keyBuffer.includes("leo")) revealGame();
    keyBuffer = keyBuffer.slice(-10);
    if (e.code === "Space" || e.code === "ArrowUp") {
      e.preventDefault();
      handleAction();
    }
    if (e.key.toLowerCase() === "r" && state.over) restart();
  });

  titleEl.addEventListener("click", () => {
    taps += 1;
    if (taps === 3) revealGame();
    setTimeout(() => { taps = 0; }, 500);
  });

  window.addEventListener("touchstart", (e) => {
    if (!revealed) return;
    e.preventDefault();
    handleAction();
  }, { passive: false });

  window.addEventListener("resize", () => {
    if (!revealed) return;
    resize();
  });
})();
</script>

</body>
</html>

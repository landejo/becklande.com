<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Beck Lande</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">

<style>
:root { --bg:#0a0a0a; --text:#f5f5f5; --accent:#22c55e; }
*{box-sizing:border-box}
html,body{height:100%;margin:0}

body{
  font-family:Inter,system-ui,sans-serif;
  color:var(--text);
  display:flex;align-items:center;justify-content:center;
  background:
    linear-gradient(rgba(255,255,255,0.03) 1px,transparent 1px),
    linear-gradient(90deg,rgba(255,255,255,0.03) 1px,transparent 1px),
    radial-gradient(circle at 30% 30%,rgba(34,197,94,0.05),transparent 40%),
    var(--bg);
  background-size:24px 24px,24px 24px,auto;
}

main{text-align:center}

h1{
  margin:0;
  font-size:clamp(3rem,8vw,6rem);
  font-weight:900;
  letter-spacing:-0.04em;
  transition:text-shadow .3s ease, transform .25s ease;
}

h1:hover{
  text-shadow:0 0 12px rgba(34,197,94,.25);
  transform:translateY(-1px);
}

canvas{position:fixed;inset:0;display:none;background:#0a0a0a}
#score{position:fixed;top:16px;right:20px;font-size:14px;color:#aaa;display:none}
#gameover{
  position:fixed;
  inset:0;
  display:none;
  align-items:center;
  justify-content:center;
  flex-direction:column;
  background:rgba(0,0,0,0.12);
  color:white;
  font-size:24px;
  opacity:0;
  transition:opacity .28s ease;
}

#gameover.show {
  opacity:1;
}

#gameover .panel {
  padding:18px 22px;
  border:1px solid rgba(255,255,255,0.14);
  background:rgba(10,10,10,0.78);
  backdrop-filter:blur(6px);
  border-radius:16px;
  text-align:center;
  transform:translateY(12px) scale(.98);
  transition:transform .28s ease, opacity .28s ease;
  opacity:0;
}

#gameover.show .panel {
  transform:translateY(0) scale(1);
  opacity:1;
}

button{
  margin-top:16px;
  padding:10px 16px;
  background:#222;
  border:1px solid #444;
  color:white;
  cursor:pointer;
}

</style>
</head>
<body>

<main>
  <h1 id="title">Beck Lande</h1>
</main>

<canvas id="game"></canvas>
<div id="score">0</div>
<div id="gameover">
  <div>Game Over</div>
  <button onclick="restart()">Play Again</button>
</div>

<script>
let keyBuffer = "";
let taps = 0;
let gameStarted = false;
let canvas, ctx, leoImg, loop;
let score = 0;
let best = Number(localStorage.getItem("leoRunnerBest") || 0);
let gameState = "idle";
let audioCtx = null;
let musicTimer = null;
let musicStep = 0;

const titleEl = document.getElementById("title");
const scoreEl = document.getElementById("score");
const gameOverEl = document.getElementById("gameover");
const canvasEl = document.getElementById("game");

const groundHeight = 86;
const player = {
  x: 92,
  y: 0,
  w: 64,
  h: 64,
  vy: 0,
  gravity: 0.78,
  jumpPower: 15.5,
  rotation: 0
};

let obstacles = [];
let particles = [];
let baseY = 0;
let speed = 7;
let spawnTimer = 0;
let shake = 0;
let flash = 0;

function initAudio() {
  if (!audioCtx) {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  }
  if (audioCtx.state === "suspended") {
    audioCtx.resume();
  }
}

function beep(freq, duration, type = "square", volume = 0.035, slideTo = null) {
  if (!audioCtx) return;
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.type = type;
  osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
  if (slideTo) {
    osc.frequency.exponentialRampToValueAtTime(slideTo, audioCtx.currentTime + duration);
  }
  gain.gain.setValueAtTime(volume, audioCtx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration);
  osc.connect(gain);
  gain.connect(audioCtx.destination);
  osc.start();
  osc.stop(audioCtx.currentTime + duration);
}

function playJumpSound() {
  beep(420, 0.08, "square", 0.04, 620);
}

function playCrashSound() {
  beep(180, 0.18, "sawtooth", 0.06, 70);
}

function playMusicTick() {
  if (!audioCtx || gameState !== "running") return;

  const leadA = [330, 392, 440, 523, 440, 392, 330, 392];
  const leadB = [494, 523, 587, 659, 587, 523, 494, 440];
  const bass = [110, 110, 147, 147, 165, 147, 110, 98];
  const harmony = [220, 247, 294, 330, 294, 247, 220, 196];

  const section = Math.floor(musicStep / 16) % 2;
  const pattern = section === 0 ? leadA : leadB;
  const i = musicStep % 8;

  const tempoBoost = Math.min(0.012, Math.max(0, (speed - 7) * 0.0009));
  const leadVol = 0.022 + tempoBoost;
  const bassVol = 0.02 + tempoBoost * 0.7;
  const hatVol = 0.008 + tempoBoost * 0.4;

  beep(pattern[i], 0.11, "square", leadVol);

  if (musicStep % 2 === 0) {
    beep(bass[i], 0.18, "triangle", bassVol);
  }

  if (musicStep % 4 === 1 || musicStep % 4 === 3) {
    beep(harmony[i], 0.06, "square", 0.010 + tempoBoost * 0.3);
  }

  // hi-hat style click
  if (musicStep % 2 === 1) {
    beep(1200, 0.02, "square", hatVol, 900);
  }

  // accent pulse every 8 beats
  if (musicStep % 8 === 0) {
    beep(82, 0.22, "sawtooth", 0.012 + tempoBoost * 0.3, 70);
  }

  musicStep += 1;
}

function startMusic() {
  stopMusic();
  musicStep = 0;
  musicTimer = setInterval(() => {
    playMusicTick();
  }, 155);
}

function stopMusic() {
  if (musicTimer) {
    clearInterval(musicTimer);
    musicTimer = null;
  }
}

function revealGame() {
  if (gameStarted) return;
  gameStarted = true;
  initAudio();

  canvas = canvasEl;
  ctx = canvas.getContext("2d");
  canvas.style.display = "block";
  scoreEl.style.display = "block";
  titleEl.parentElement.style.opacity = "0";

  leoImg = new Image();
  const spriteCandidates = ["leo_sprite_v2.png", "leo_sprite_pro.png", "leo.png"];
  let idx = 0;

  leoImg.onload = () => {
    initGame();
    startMusic();
    run();
  };
  leoImg.onerror = () => {
    idx += 1;
    if (idx < spriteCandidates.length) {
      leoImg.src = spriteCandidates[idx];
    } else {
      initGame();
      startMusic();
      run();
    }
  };
  leoImg.src = spriteCandidates[idx];
}

function resizeGame() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
  baseY = canvas.height - groundHeight;
  if (player.y === 0 || player.y > baseY - player.h) {
    player.y = baseY - player.h;
  }
}

function initGame() {
  resizeGame();
  restart();
}

function restart() {
  score = 0;
  speed = 7;
  spawnTimer = 55;
  obstacles = [];
  particles = [];
  shake = 0;
  flash = 0;
  player.vy = 0;
  player.rotation = 0;
  player.y = baseY - player.h;
  gameState = "running";
  gameOverEl.classList.remove("show");
  gameOverEl.style.display = "none";
  updateScore();
  startMusic();
}

function handleAction() {
  initAudio();
  if (!gameStarted) return;
  if (gameState === "gameover") {
    restart();
    return;
  }
  jump();
}

function jump() {
  const onGround = player.y >= baseY - player.h - 0.5;
  if (!onGround) return;
  player.vy = -player.jumpPower;
  playJumpSound();
}

function spawnObstacle() {
  const h = 28 + Math.random() * 22;
  const w = 18 + Math.random() * 16;
  obstacles.push({
    x: canvas.width + 20,
    y: baseY - h,
    w,
    h
  });
}

function addImpactParticles() {
  for (let i = 0; i < 22; i++) {
    particles.push({
      x: player.x + player.w * 0.5,
      y: player.y + player.h * 0.6,
      r: 2 + Math.random() * 4,
      vx: -4 + Math.random() * 8,
      vy: -4 + Math.random() * 4,
      a: 0.45 + Math.random() * 0.25
    });
  }
}

function update() {
  if (gameState === "gameover") {
    player.vy += player.gravity * 0.9;
    player.y += player.vy;
    player.rotation += 0.14;
    shake = Math.max(0, shake - 0.5);
    flash = Math.max(0, flash - 0.02);
    for (let i = particles.length - 1; i >= 0; i--) {
      const p = particles[i];
      p.x += p.vx;
      p.y += p.vy;
      p.a -= 0.018;
      if (p.a <= 0) particles.splice(i, 1);
    }
    return;
  }

  player.vy += player.gravity;
  player.y += player.vy;

  if (player.y >= baseY - player.h) {
    player.y = baseY - player.h;
    player.vy = 0;
    player.rotation = 0;
  } else {
    player.rotation = Math.max(-0.35, Math.min(0.45, player.vy * 0.03));
  }

  spawnTimer -= 1;
  if (spawnTimer <= 0) {
    spawnObstacle();
    spawnTimer = Math.max(42, 92 - speed * 4 + Math.random() * 24);
  }

  for (let i = obstacles.length - 1; i >= 0; i--) {
    const o = obstacles[i];
    o.x -= speed;

    const hitbox = {
      x: player.x + 12,
      y: player.y + 10,
      w: player.w - 24,
      h: player.h - 18
    };

    if (
      hitbox.x < o.x + o.w &&
      hitbox.x + hitbox.w > o.x &&
      hitbox.y < o.y + o.h &&
      hitbox.y + hitbox.h > o.y
    ) {
      gameOver();
      break;
    }

    if (o.x + o.w < 0) {
      obstacles.splice(i, 1);
      score += 1;
      if (score > best) {
        best = score;
        localStorage.setItem("leoRunnerBest", String(best));
      }
      updateScore();
    }
  }

  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.x += p.vx;
    p.y += p.vy;
    p.a -= 0.012;
    if (p.a <= 0) particles.splice(i, 1);
  }

  speed += 0.0023;
}

function updateScore() {
  scoreEl.textContent = `Score ${score} · Best ${best}`;
}

function gameOver() {
  if (gameState === "gameover") return;
  gameState = "gameover";
  stopMusic();
  playCrashSound();
  player.vy = -8.5;
  player.rotation = -0.15;
  shake = 8;
  flash = 0.35;
  addImpactParticles();

  setTimeout(() => {
    if (gameState !== "gameover") return;
    gameOverEl.innerHTML = `<div class="panel"><div>Game Over</div><button onclick="restart()">Play Again</button></div>`;
    gameOverEl.style.display = "flex";
    requestAnimationFrame(() => gameOverEl.classList.add("show"));
  }, 650);
}

function drawBackground() {
  const dx = shake > 0 ? (Math.random() - 0.5) * shake : 0;
  const dy = shake > 0 ? (Math.random() - 0.5) * shake * 0.35 : 0;

  ctx.save();
  ctx.translate(dx, dy);

  ctx.clearRect(0, 0, canvas.width, canvas.height);
  const sky = ctx.createLinearGradient(0, 0, 0, canvas.height);
  sky.addColorStop(0, "#0a0a0a");
  sky.addColorStop(1, "#101312");
  ctx.fillStyle = sky;
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  ctx.globalAlpha = 0.06;
  for (let x = 0; x < canvas.width; x += 24) ctx.fillRect(x, 0, 1, canvas.height);
  for (let y = 0; y < canvas.height; y += 24) ctx.fillRect(0, y, canvas.width, 1);
  ctx.globalAlpha = 1;

  ctx.fillStyle = "#1a1a1a";
  ctx.fillRect(0, baseY, canvas.width, groundHeight);
  ctx.fillStyle = "rgba(34,197,94,0.32)";
  ctx.fillRect(0, baseY, canvas.width, 2);
}

function drawObstacles() {
  ctx.fillStyle = "#22c55e";
  for (const o of obstacles) {
    ctx.fillRect(o.x, o.y, o.w, o.h);
    ctx.fillStyle = "rgba(255,255,255,0.08)";
    ctx.fillRect(o.x, o.y, o.w, 3);
    ctx.fillStyle = "#22c55e";
  }
}

function drawParticles() {
  for (const p of particles) {
    ctx.fillStyle = `rgba(255,255,255,${p.a})`;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
    ctx.fill();
  }
}

function drawPlayer() {
  ctx.save();
  ctx.translate(player.x + player.w / 2, player.y + player.h / 2);
  ctx.rotate(player.rotation);

  if (leoImg && leoImg.complete && leoImg.naturalWidth > 0) {
    ctx.drawImage(leoImg, -player.w / 2, -player.h / 2, player.w, player.h);
  } else {
    ctx.fillStyle = "#f97316";
    ctx.beginPath();
    ctx.arc(0, 0, 22, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = "white";
    ctx.font = "700 14px Inter, sans-serif";
    ctx.textAlign = "center";
    ctx.textBaseline = "middle";
    ctx.fillText("L", 0, 1);
  }

  ctx.restore();
}

function drawHint() {
  if (score > 0 || gameState !== "running") return;
  ctx.fillStyle = "rgba(255,255,255,0.7)";
  ctx.font = "16px Inter, sans-serif";
  ctx.textAlign = "center";
  ctx.fillText("Tap or press space to jump", canvas.width / 2, 52);
}

function render() {
  drawBackground();
  drawObstacles();
  drawParticles();
  drawPlayer();
  drawHint();

  if (flash > 0) {
    ctx.fillStyle = `rgba(255,255,255,${flash})`;
    ctx.fillRect(-40, -40, canvas.width + 80, canvas.height + 80);
  }

  ctx.restore();
}

function run() {
  update();
  render();
  loop = requestAnimationFrame(run);
}

window.addEventListener("keydown", e => {
  keyBuffer += e.key.toLowerCase();
  if (keyBuffer.includes("leo")) revealGame();
  keyBuffer = keyBuffer.slice(-10);

  if (e.code === "Space" || e.code === "ArrowUp") {
    e.preventDefault();
    handleAction();
  }

  if (e.key.toLowerCase() === "r" && gameState === "gameover") {
    restart();
  }
});

titleEl.addEventListener("click", () => {
  taps += 1;
  if (taps === 3) revealGame();
  setTimeout(() => { taps = 0; }, 500);
});

window.addEventListener("touchstart", e => {
  if (!gameStarted) return;
  e.preventDefault();
  handleAction();
}, { passive: false });

window.addEventListener("resize", () => {
  if (!gameStarted) return;
  resizeGame();
});

window.restart = restart;
</script>

</body>
</html>

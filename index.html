<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Beck Lande</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">

<style>
:root { --bg:#0a0a0a; --text:#f5f5f5; --accent:#22c55e; }
*{box-sizing:border-box}
html,body{height:100%;margin:0}

body{
  font-family:Inter,system-ui,sans-serif;
  color:var(--text);
  display:flex;align-items:center;justify-content:center;
  background:
    linear-gradient(rgba(255,255,255,0.03) 1px,transparent 1px),
    linear-gradient(90deg,rgba(255,255,255,0.03) 1px,transparent 1px),
    radial-gradient(circle at 30% 30%,rgba(34,197,94,0.05),transparent 40%),
    var(--bg);
  background-size:24px 24px,24px 24px,auto;
}

main{text-align:center}

h1{
  margin:0;
  font-size:clamp(3rem,8vw,6rem);
  font-weight:900;
  letter-spacing:-0.04em;
  transition:text-shadow .3s ease, transform .25s ease;
}

h1:hover{
  text-shadow:0 0 12px rgba(34,197,94,.25);
  transform:translateY(-1px);
}

canvas{position:fixed;inset:0;display:none;background:#0a0a0a}
#score{position:fixed;top:16px;right:20px;font-size:14px;color:#aaa;display:none}
#gameover{
  position:fixed;
  inset:0;
  display:none;
  align-items:center;
  justify-content:center;
  flex-direction:column;
  background:rgba(0,0,0,0.12);
  color:white;
  font-size:24px;
  opacity:0;
  transition:opacity .28s ease;
}

#gameover.show {
  opacity:1;
}

#gameover .panel {
  padding:18px 22px;
  border:1px solid rgba(255,255,255,0.14);
  background:rgba(10,10,10,0.78);
  backdrop-filter:blur(6px);
  border-radius:16px;
  text-align:center;
  transform:translateY(12px) scale(.98);
  transition:transform .28s ease, opacity .28s ease;
  opacity:0;
}

#gameover.show .panel {
  transform:translateY(0) scale(1);
  opacity:1;
}

button{
  margin-top:16px;
  padding:10px 16px;
  background:#222;
  border:1px solid #444;
  color:white;
  cursor:pointer;
}

</style>
</head>
<body>

<main>
  <h1 id="title">Beck Lande</h1>
</main>

<canvas id="game"></canvas>
<div id="score">0</div>
<div id="gameover">
  <div>Game Over</div>
  <button onclick="restart()">Play Again</button>
</div>

<script>
let keyBuffer = "";
let taps = 0;
let gameStarted = false;
let canvas, ctx, leoImg, loop;
let score = 0;
let best = Number(localStorage.getItem("leoRunnerBest") || 0);
let gameState = "idle";

// --- AUDIO ---
let audioCtx;
let musicInterval;

function initAudio() {
  if (!audioCtx) {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  }
}

function playJumpSound() {
  if (!audioCtx) return;
  const o = audioCtx.createOscillator();
  const g = audioCtx.createGain();
  o.type = "square";
  o.frequency.value = 320;
  g.gain.value = 0.1;
  o.connect(g);
  g.connect(audioCtx.destination);
  o.start();
  o.stop(audioCtx.currentTime + 0.08);
}

function playCrashSound() {
  if (!audioCtx) return;
  const o = audioCtx.createOscillator();
  const g = audioCtx.createGain();
  o.type = "sawtooth";
  o.frequency.value = 90;
  g.gain.value = 0.15;
  o.connect(g);
  g.connect(audioCtx.destination);
  o.start();
  o.stop(audioCtx.currentTime + 0.2);
}

function startMusic() {
  if (!audioCtx) return;
  if (musicInterval) return;

  const notes = [220, 262, 294, 262, 330, 294];
  let i = 0;

  musicInterval = setInterval(() => {
    if (gameState !== "running") return;

    const o = audioCtx.createOscillator();
    const g = audioCtx.createGain();

    o.type = "square";
    o.frequency.value = notes[i % notes.length];

    g.gain.value = 0.06;

    o.connect(g);
    g.connect(audioCtx.destination);

    o.start();
    o.stop(audioCtx.currentTime + 0.12);

    i++;
  }, 180);
}

function stopMusic() {
  clearInterval(musicInterval);
  musicInterval = null;
}

const titleEl = document.getElementById("title");
const scoreEl = document.getElementById("score");
const gameOverEl = document.getElementById("gameover");
const canvasEl = document.getElementById("game");

const groundHeight = 84;
const player = { x: 88, y: 0, w: 64, h: 64, vy: 0, jumpPower: 15.5, gravity: 0.72 };

let obstacles = [];
let particles = [];
let spawnTimer = 0;
let speed = 7;
let baseY = 0;
let gameOverTimer = 0;
let crashFlash = 0;
let leoRotation = 0;
let impactX = 0;
let shake = 0;

window.addEventListener("keydown", e => {
  keyBuffer += e.key.toLowerCase();
  if (keyBuffer.includes("leo")) revealGame();
  keyBuffer = keyBuffer.slice(-10);

  if (e.code === "Space" || e.code === "ArrowUp") {
    e.preventDefault();
    handleAction();
  }
});

titleEl.addEventListener("click", () => {
  taps++;
  if (taps === 3) revealGame();
  setTimeout(() => taps = 0, 500);
});

window.addEventListener("touchstart", e => {
  if (!gameStarted) return;
  e.preventDefault();
  handleAction();
}, { passive: false });

function revealGame() {
  if (gameStarted) return;
  gameStarted = true;
  initAudio();

  canvas = canvasEl;
  ctx = canvas.getContext("2d");
  canvas.style.display = "block";
  scoreEl.style.display = "block";
  titleEl.parentElement.style.opacity = "0";

  leoImg = new Image();
  leoImg.src = "leo_sprite_v2.png";

  leoImg.onload = () => {
    initGame();
    startMusic();
    run();
  };

  leoImg.onerror = () => {
    initGame();
    startMusic();
    run();
  };
}

function resizeGame() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
  baseY = canvas.height - groundHeight;
  if (player.y === 0 || player.y > baseY - player.h) {
    player.y = baseY - player.h;
  }
}

function initGame() {
  resizeGame();
  restart();
}

function restart() {
  score = 0;
  speed = 7;
  spawnTimer = 0;
  obstacles = [];
  particles = [];
  player.vy = 0;
  player.y = baseY - player.h;
  gameState = "running";
  gameOverTimer = 0;
  crashFlash = 0;
  leoRotation = 0;
  impactX = 0;
  shake = 0;
  gameOverEl.classList.remove("show");
  gameOverEl.style.display = "none";
  updateScore();
}

function handleAction() {
  if (!gameStarted) return;
  if (gameState === "gameover") {
    restart();
    return;
  }
  jump();
}

function jump() {
  const onGround = player.y >= baseY - player.h - 0.5;
  if (!onGround) return;
  player.vy = -player.jumpPower;
  playJumpSound();
}

function spawnObstacle() {
  const h = 28 + Math.random() * 22;
  const w = 18 + Math.random() * 16;
  obstacles.push({ x: canvas.width + 20, y: baseY - h, w, h });
}

function update() {
  if (gameState === "gameover") return;

  player.vy += player.gravity;
  player.y += player.vy;

  if (player.y >= baseY - player.h) {
    player.y = baseY - player.h;
    player.vy = 0;
  }

  spawnTimer--;
  if (spawnTimer <= 0) {
    spawnObstacle();
    spawnTimer = Math.max(48, 92 - speed * 4 + Math.random() * 24);
  }

  for (let i = obstacles.length - 1; i >= 0; i--) {
    const o = obstacles[i];
    o.x -= speed;

    if (player.x < o.x + o.w && player.x + player.w > o.x && player.y < o.y + o.h && player.y + player.h > o.y) {
      gameOver();
    }

    if (o.x + o.w < 0) {
      obstacles.splice(i, 1);
      score++;
      updateScore();
    }
  }

  speed += 0.0025;
}

function updateScore() {
  scoreEl.textContent = `Score ${score}`;
}

function gameOver() {
  if (gameState === "gameover") return;
  gameState = "gameover";
  stopMusic();
  playCrashSound();

  gameOverEl.innerHTML = `<div class="panel"><div>Game Over</div><button onclick="restart()">Play Again</button></div>`;
  gameOverEl.style.display = "flex";
  requestAnimationFrame(() => gameOverEl.classList.add("show"));
}

function render() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  ctx.fillStyle = "#181818";
  ctx.fillRect(0, baseY, canvas.width, groundHeight);

  ctx.fillStyle = "#22c55e";
  for (const o of obstacles) {
    ctx.fillRect(o.x, o.y, o.w, o.h);
  }

  if (leoImg && leoImg.complete) {
    ctx.drawImage(leoImg, player.x, player.y, player.w, player.h);
  }
}

function run() {
  update();
  render();
  loop = requestAnimationFrame(run);
}
</script>

</body>
</html>

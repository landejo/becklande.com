<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Beck Lande</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">

<style>
:root { --bg:#0a0a0a; --text:#f5f5f5; --accent:#22c55e; }
*{box-sizing:border-box}
html,body{height:100%;margin:0}

body{
  font-family:Inter,system-ui,sans-serif;
  color:var(--text);
  display:flex;align-items:center;justify-content:center;
  background:
    linear-gradient(rgba(255,255,255,0.03) 1px,transparent 1px),
    linear-gradient(90deg,rgba(255,255,255,0.03) 1px,transparent 1px),
    radial-gradient(circle at 30% 30%,rgba(34,197,94,0.05),transparent 40%),
    var(--bg);
  background-size:24px 24px,24px 24px,auto;
}

main{text-align:center}

h1{
  margin:0;
  font-size:clamp(3rem,8vw,6rem);
  font-weight:900;
  letter-spacing:-0.04em;
  transition:text-shadow .3s ease, transform .25s ease;
}

h1:hover{
  text-shadow:0 0 12px rgba(34,197,94,.25);
  transform:translateY(-1px);
}

canvas{position:fixed;inset:0;display:none;background:#0a0a0a}
#score{position:fixed;top:16px;right:20px;font-size:14px;color:#aaa;display:none}
#gameover{
  position:fixed;
  inset:0;
  display:none;
  align-items:center;
  justify-content:center;
  flex-direction:column;
  background:rgba(0,0,0,0.6);
  color:white;
  font-size:24px;
}

button{
  margin-top:16px;
  padding:10px 16px;
  background:#222;
  border:1px solid #444;
  color:white;
  cursor:pointer;
}

</style>
</head>
<body>

<main>
  <h1 id="title">Beck Lande</h1>
</main>

<canvas id="game"></canvas>
<div id="score">0</div>
<div id="gameover">
  <div>Game Over</div>
  <button onclick="restart()">Play Again</button>
</div>

<script>
let keyBuffer="";
window.addEventListener("keydown",e=>{
  keyBuffer+=e.key.toLowerCase();
  if(keyBuffer.includes("leo")) startGame();
  keyBuffer=keyBuffer.slice(-10);
});

let taps=0;
document.getElementById("title").addEventListener("click",()=>{
  taps++; if(taps===3) startGame();
  setTimeout(()=>taps=0,500);
});

let canvas,ctx,player,gravity,obstacles,speed,score,loop,leoImg;

function startGame(){
  canvas=document.getElementById("game");
  ctx=canvas.getContext("2d");
  document.getElementById("score").style.display="block";
  canvas.style.display="block";

  canvas.width=window.innerWidth;
  canvas.height=window.innerHeight;

leoImg = new Image();
leoImg.src = "leo_sprite_pro.png";

leoImg.onload = () => {
  resetGame();
  update();
};

  resetGame();
  update();
}

function resetGame(){
  player={x:80,y:canvas.height-120,vy:0,size:60};
  gravity=0.6;
  obstacles=[];
  speed=6;
  score=0;
  document.getElementById("gameover").style.display="none";
}

function spawn(){
  obstacles.push({
    x:canvas.width+50,
    y:canvas.height-100,
    w:30+Math.random()*30,
    h:40
  });
}

function drawPlayer(){
  if(leoImg.complete){
    ctx.drawImage(leoImg, player.x-30, player.y-30, 60, 60);
  }
}

function update(){
  ctx.clearRect(0,0,canvas.width,canvas.height);

  ctx.fillStyle="#222";
  ctx.fillRect(0,canvas.height-80,canvas.width,2);

  player.vy+=gravity;
  player.y+=player.vy;

  if(player.y>canvas.height-100){player.y=canvas.height-100;player.vy=0}

  drawPlayer();

  ctx.fillStyle="#22c55e";
  obstacles.forEach((o,i)=>{
    o.x-=speed;
    ctx.fillRect(o.x,o.y,o.w,o.h);

    if(o.x<player.x+20 && o.x+o.w>player.x-20 && player.y>o.y-20){
      gameOver(); return;
    }

    if(o.x+o.w<0) obstacles.splice(i,1);
  });

  score++;
  speed += 0.002; // difficulty ramp
  document.getElementById("score").innerText=score;

  if(Math.random()<0.02) spawn();

  loop=requestAnimationFrame(update);
}

function jump(){
  if(player.y>=canvas.height-100){
    player.vy=-12;
    playBeep(200);
  }
}

function gameOver(){
  cancelAnimationFrame(loop);
  playBeep(80);
  document.getElementById("gameover").style.display="flex";
}

function restart(){
  resetGame();
  update();
}

// simple sound
function playBeep(freq){
  const ctx=new (window.AudioContext||window.webkitAudioContext)();
  const osc=ctx.createOscillator();
  osc.type="square";
  osc.frequency.value=freq;
  osc.connect(ctx.destination);
  osc.start();
  osc.stop(ctx.currentTime+0.1);
}

window.addEventListener("keydown",e=>{ if(e.code==="Space") jump(); });
window.addEventListener("touchstart",jump);
</script>

</body>
</html>

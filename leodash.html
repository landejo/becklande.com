<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Leo Dash</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@500;700;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg1: #07131f;
      --bg2: #0b2236;
      --cyan: #2ee6ff;
      --cyan-soft: rgba(46, 230, 255, 0.18);
      --pink: #ff4fd8;
      --pink-soft: rgba(255, 79, 216, 0.18);
      --yellow: #ffd84d;
      --panel: rgba(7, 16, 28, 0.72);
      --text: #eef8ff;
      --muted: rgba(238, 248, 255, 0.7);
      --danger: #ff6b6b;
    }

    * { box-sizing: border-box; }
    html, body { height: 100%; }
    body {
      margin: 0;
      overflow: hidden;
      font-family: Inter, system-ui, sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top left, rgba(46,230,255,0.14), transparent 30%),
        radial-gradient(circle at top right, rgba(255,79,216,0.14), transparent 28%),
        linear-gradient(180deg, var(--bg2), var(--bg1));
    }

    canvas {
      display: block;
      width: 100vw;
      height: 100vh;
    }

    .hud {
      position: fixed;
      top: 16px;
      left: 16px;
      right: 16px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
      z-index: 10;
      pointer-events: none;
    }

    .pill {
      padding: 10px 14px;
      border-radius: 999px;
      background: var(--panel);
      border: 1px solid rgba(255,255,255,0.12);
      backdrop-filter: blur(12px);
      box-shadow: 0 0 0 1px rgba(255,255,255,0.02), 0 12px 24px rgba(0,0,0,0.24);
      font-weight: 700;
      letter-spacing: 0.02em;
      font-size: 14px;
      white-space: nowrap;
    }

    .progress-wrap {
      position: fixed;
      top: 72px;
      left: 16px;
      right: 16px;
      height: 12px;
      background: rgba(255,255,255,0.08);
      border-radius: 999px;
      overflow: hidden;
      z-index: 10;
      box-shadow: inset 0 0 0 1px rgba(255,255,255,0.05);
      pointer-events: none;
    }

    .progress-bar {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, var(--cyan), var(--pink));
      box-shadow: 0 0 24px rgba(46,230,255,0.45);
      transition: width 0.08s linear;
    }

    .center-ui {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 20;
      padding: 20px;
    }

    .card {
      width: min(680px, 100%);
      text-align: center;
      background: linear-gradient(180deg, rgba(6,18,30,0.88), rgba(8,14,26,0.9));
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 28px;
      padding: 28px 24px;
      box-shadow: 0 26px 60px rgba(0,0,0,0.35);
      backdrop-filter: blur(10px);
    }

    h1 {
      margin: 0 0 10px;
      font-size: clamp(2.3rem, 7vw, 5rem);
      line-height: 0.9;
      letter-spacing: -0.05em;
    }

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Leo Dash</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@500;700;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg1: #07131f;
      --bg2: #0b2236;
      --cyan: #2ee6ff;
      --pink: #ff4fd8;
      --yellow: #ffd84d;
      --panel: rgba(7, 16, 28, 0.78);
      --text: #eef8ff;
      --muted: rgba(238, 248, 255, 0.74);
    }

    * { box-sizing: border-box; }
    html, body { height: 100%; }
    body {
      margin: 0;
      overflow: hidden;
      font-family: Inter, system-ui, sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top left, rgba(46,230,255,0.14), transparent 30%),
        radial-gradient(circle at top right, rgba(255,79,216,0.14), transparent 28%),
        linear-gradient(180deg, var(--bg2), var(--bg1));
    }

    canvas {
      display: block;
      width: 100vw;
      height: 100vh;
    }

    .hud {
      position: fixed;
      top: 16px;
      left: 16px;
      right: 16px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
      z-index: 10;
      pointer-events: none;
    }

    .pill {
      padding: 10px 14px;
      border-radius: 999px;
      background: var(--panel);
      border: 1px solid rgba(255,255,255,0.12);
      backdrop-filter: blur(12px);
      box-shadow: 0 12px 24px rgba(0,0,0,0.24);
      font-weight: 700;
      letter-spacing: 0.02em;
      font-size: 14px;
      white-space: nowrap;
    }

    .progress-wrap {
      position: fixed;
      top: 72px;
      left: 16px;
      right: 16px;
      height: 12px;
      background: rgba(255,255,255,0.08);
      border-radius: 999px;
      overflow: hidden;
      z-index: 10;
      box-shadow: inset 0 0 0 1px rgba(255,255,255,0.05);
      pointer-events: none;
    }

    .progress-bar {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, var(--cyan), var(--pink));
      box-shadow: 0 0 24px rgba(46,230,255,0.45);
      transition: width 0.08s linear;
    }

    .center-ui {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 20;
      padding: 20px;
    }

    .card {
      width: min(700px, 100%);
      text-align: center;
      background: linear-gradient(180deg, rgba(6,18,30,0.9), rgba(8,14,26,0.92));
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 28px;
      padding: 28px 24px;
      box-shadow: 0 26px 60px rgba(0,0,0,0.35);
      backdrop-filter: blur(10px);
      pointer-events: auto;
    }

    h1 {
      margin: 0 0 10px;
      font-size: clamp(2.3rem, 7vw, 5rem);
      line-height: 0.9;
      letter-spacing: -0.05em;
    }

    .gradient {
      background: linear-gradient(90deg, var(--cyan), var(--pink), var(--yellow));
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      text-shadow: 0 0 24px rgba(46, 230, 255, 0.18);
    }

    .sub {
      margin: 0 auto 18px;
      max-width: 52ch;
      color: var(--muted);
      line-height: 1.5;
      font-size: 15px;
    }

    .controls {
      display: flex;
      justify-content: center;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: 18px;
    }

    .btn {
      appearance: none;
      border: 0;
      border-radius: 16px;
      padding: 13px 18px;
      font: inherit;
      font-weight: 800;
      cursor: pointer;
      color: #06111e;
      background: linear-gradient(90deg, var(--cyan), #88f3ff);
      box-shadow: 0 12px 24px rgba(46, 230, 255, 0.2);
    }

    .btn.alt {
      background: rgba(255,255,255,0.08);
      color: var(--text);
      box-shadow: none;
      border: 1px solid rgba(255,255,255,0.1);
    }

    .tiny {
      margin-top: 16px;
      color: rgba(238,248,255,0.62);
      font-size: 12px;
      letter-spacing: 0.03em;
    }

    .hidden { display: none !important; }

    .mobile-jump {
      position: fixed;
      bottom: 18px;
      right: 18px;
      width: 86px;
      height: 86px;
      border: 0;
      border-radius: 50%;
      background: radial-gradient(circle at 30% 30%, rgba(255,255,255,0.22), rgba(255,255,255,0.06));
      color: var(--text);
      font: inherit;
      font-weight: 900;
      z-index: 25;
      box-shadow: 0 16px 34px rgba(0,0,0,0.25);
      backdrop-filter: blur(8px);
      display: none;
    }

    @media (max-width: 800px) {
      .mobile-jump { display: block; }
    }
  </style>
</head>
<body>
  <canvas id="game"></canvas>

  <div class="hud">
    <div class="pill">Leo Dash</div>
    <div class="pill" id="scoreLabel">0%</div>
  </div>

  <div class="progress-wrap">
    <div class="progress-bar" id="progressBar"></div>
  </div>

  <div class="center-ui" id="startScreen">
    <div class="card">
      <h1 class="gradient">Leo Dash</h1>
      <p class="sub">An easier, more playful version. Bigger gaps, fewer spikes, softer speed ramp, and practice mode if you want a no-stress run.</p>
      <div class="controls">
        <button class="btn" id="startBtn">Start</button>
        <button class="btn alt" id="practiceBtn">Practice Mode</button>
      </div>
      <div class="tiny">Desktop: space / up / click • Mobile: tap</div>
    </div>
  </div>

  <div class="center-ui hidden" id="gameOverScreen">
    <div class="card">
      <h1 id="resultTitle">Game Over</h1>
      <p class="sub" id="resultText">You made it 0% through the level.</p>
      <div class="controls">
        <button class="btn" id="retryBtn">Retry</button>
        <button class="btn alt" id="menuBtn">Menu</button>
      </div>
      <div class="tiny" id="bestText">Best: 0%</div>
    </div>
  </div>

  <button class="mobile-jump" id="jumpBtn">JUMP</button>

  <script>
    (() => {
      const canvas = document.getElementById('game');
      const ctx = canvas.getContext('2d');
      const progressBar = document.getElementById('progressBar');
      const scoreLabel = document.getElementById('scoreLabel');
      const startScreen = document.getElementById('startScreen');
      const gameOverScreen = document.getElementById('gameOverScreen');
      const resultText = document.getElementById('resultText');
      const resultTitle = document.getElementById('resultTitle');
      const bestText = document.getElementById('bestText');
      const jumpBtn = document.getElementById('jumpBtn');
      const startBtn = document.getElementById('startBtn');
      const practiceBtn = document.getElementById('practiceBtn');
      const retryBtn = document.getElementById('retryBtn');
      const menuBtn = document.getElementById('menuBtn');

      let w = 0;
      let h = 0;
      let raf = null;
      let practiceMode = false;
      let audioCtx = null;
      let beatTimer = null;
      let beatStep = 0;
      const levelLength = 6200;
      const bestKey = 'leoDashBestEasy';
      let best = Number(localStorage.getItem(bestKey) || 0);

      const colors = {
        cyan: '#2ee6ff',
        pink: '#ff4fd8',
        yellow: '#ffd84d',
        white: '#eef8ff'
      };

      const game = {
        running: false,
        ended: false,
        completion: 0,
        scrollX: 0,
        speed: 4.2,
        gravity: 0.6,
        cameraShake: 0,
        flash: 0,
        player: {
          x: 180,
          y: 0,
          size: 56,
          vy: 0,
          rotation: 0,
          onGround: false,
          coyote: 0,
          jumpBuffer: 0
        },
        particles: [],
        obstacles: [],
        deco: [],
        stars: []
      };

      const leo = new Image();
      let spriteLoaded = false;
      leo.onload = () => { spriteLoaded = true; };
      leo.onerror = () => { spriteLoaded = false; };
      leo.src = 'leo.png';

      function resize() {
        w = window.innerWidth;
        h = window.innerHeight;
        canvas.width = w;
        canvas.height = h;
        if (!game.running) game.player.y = groundY() - game.player.size / 2;
      }

      function groundY() {
        return Math.floor(h * 0.74);
      }

      function initAudio() {
        if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        if (audioCtx.state === 'suspended') audioCtx.resume();
      }

      function synth(freq, duration, type = 'square', volume = 0.018, slideTo = null) {
        if (!audioCtx) return;
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.type = type;
        osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
        if (slideTo) osc.frequency.exponentialRampToValueAtTime(slideTo, audioCtx.currentTime + duration);
        gain.gain.setValueAtTime(volume, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration);
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        osc.start();
        osc.stop(audioCtx.currentTime + duration);
      }

      function jumpSound() { synth(420, 0.08, 'square', 0.028, 650); }
      function hitSound() { synth(180, 0.18, 'sawtooth', 0.05, 70); }
      function starSound() { synth(740, 0.04, 'square', 0.014, 980); }
      function winSound() {
        synth(523, 0.12, 'square', 0.028);
        setTimeout(() => synth(659, 0.14, 'square', 0.028), 90);
        setTimeout(() => synth(784, 0.18, 'square', 0.028), 180);
      }

      function musicTick() {
        if (!game.running || game.ended) return;
        const lead = [330, 392, 440, 392, 523, 440, 392, 330];
        const bass = [110, 110, 147, 110, 165, 147, 110, 98];
        const i = beatStep % 8;
        synth(lead[i], 0.10, 'square', 0.018);
        if (beatStep % 2 === 0) synth(bass[i], 0.15, 'triangle', 0.014);
        if (beatStep % 4 === 1 || beatStep % 4 === 3) synth(980, 0.018, 'square', 0.005, 760);
        beatStep += 1;
      }

      function startMusic() {
        stopMusic();
        beatStep = 0;
        beatTimer = setInterval(musicTick, 160);
      }

      function stopMusic() {
        if (beatTimer) {
          clearInterval(beatTimer);
          beatTimer = null;
        }
      }

      function buildLevel() {
        const spikes = [920, 1360, 1820, 2360, 2860, 3480, 4100, 4740, 5480];
        const blocks = [
          { x: 1100, w: 110, h: 34 },
          { x: 2600, w: 130, h: 38 },
          { x: 4300, w: 130, h: 36 }
        ];
        const stars = [
          { x: 760, y: -120 },
          { x: 1680, y: -110 },
          { x: 3240, y: -130 },
          { x: 5020, y: -120 }
        ];

        game.obstacles = [];
        spikes.forEach(x => game.obstacles.push({ type: 'spike', x, w: 34, h: 24 }));
        blocks.forEach(b => game.obstacles.push({ type: 'block', x: b.x, w: b.w, h: b.h }));
        game.stars = stars.map(s => ({ x: s.x, y: s.y, taken: false }));

        game.deco = [];
        for (let i = 0; i < 90; i++) {
          game.deco.push({
            x: 120 + i * 90,
            y: 70 + Math.sin(i * 0.7) * 24,
            size: 8 + (i % 3) * 4,
            color: i % 2 === 0 ? colors.cyan : colors.pink
          });
        }
      }

      function resetGame() {
        game.running = true;
        game.ended = false;
        game.completion = 0;
        game.scrollX = 0;
        game.speed = 4.2;
        game.cameraShake = 0;
        game.flash = 0;
        game.player.x = Math.max(110, Math.min(230, w * 0.21));
        game.player.y = groundY() - game.player.size / 2;
        game.player.vy = 0;
        game.player.rotation = 0;
        game.player.onGround = true;
        game.player.coyote = 0;
        game.player.jumpBuffer = 0;
        game.particles = [];
        buildLevel();
        updateProgress();
        startMusic();
      }

      function start(practice = false) {
        practiceMode = practice;
        initAudio();
        startScreen.classList.add('hidden');
        gameOverScreen.classList.add('hidden');
        resetGame();
        if (!raf) frame();
      }

      function backToMenu() {
        stopMusic();
        game.running = false;
        game.ended = false;
        startScreen.classList.remove('hidden');
        gameOverScreen.classList.add('hidden');
      }

      function updateProgress() {
        const pct = Math.max(0, Math.min(100, Math.round(game.completion)));
        progressBar.style.width = pct + '%';
        scoreLabel.textContent = pct + '%';
      }

      function queueJump() {
        game.player.jumpBuffer = 8;
      }

      function performJump() {
        game.player.vy = -12.8;
        game.player.onGround = false;
        game.player.coyote = 0;
        game.player.jumpBuffer = 0;
        jumpSound();
      }

      function fail() {
        if (game.ended) return;
        game.ended = true;
        game.running = false;
        stopMusic();
        hitSound();
        game.cameraShake = 8;
        game.flash = 0.24;
        for (let i = 0; i < 20; i++) {
          game.particles.push({
            x: game.player.x,
            y: game.player.y,
            vx: -4 + Math.random() * 8,
            vy: -4 + Math.random() * 8,
            size: 3 + Math.random() * 4,
            a: 0.4 + Math.random() * 0.3,
            color: i % 2 === 0 ? colors.cyan : colors.pink
          });
        }
        const pct = Math.round(game.completion);
        best = Math.max(best, pct);
        localStorage.setItem(bestKey, String(best));
        resultTitle.textContent = 'Game Over';
        resultText.textContent = `You made it ${pct}% through the level.`;
        bestText.textContent = `Best: ${best}%${practiceMode ? ' · Practice' : ''}`;
        setTimeout(() => gameOverScreen.classList.remove('hidden'), 420);
      }

      function win() {
        if (game.ended) return;
        game.ended = true;
        game.running = false;
        stopMusic();
        winSound();
        best = Math.max(best, 100);
        localStorage.setItem(bestKey, String(best));
        updateProgress();
        resultTitle.textContent = 'Level Complete';
        resultText.textContent = 'Leo made it to the end.';
        bestText.textContent = `Best: ${best}%`;
        setTimeout(() => gameOverScreen.classList.remove('hidden'), 320);
      }

      function playerBounds() {
        const p = game.player;
        const size = p.size * 0.68;
        return { x: p.x - size / 2, y: p.y - size / 2, w: size, h: size };
      }

      function intersects(a, b) {
        return a.x < b.x + b.w && a.x + a.w > b.x && a.y < b.y + b.h && a.y + a.h > b.y;
      }

      function updateParticles() {
        for (let i = game.particles.length - 1; i >= 0; i--) {
          const p = game.particles[i];
          p.x += p.vx;
          p.y += p.vy;
          p.a -= 0.02;
          if (p.a <= 0) game.particles.splice(i, 1);
        }
      }

      function update() {
        if (!game.running) {
          updateParticles();
          game.cameraShake = Math.max(0, game.cameraShake - 0.6);
          game.flash = Math.max(0, game.flash - 0.025);
          return;
        }

        game.scrollX += game.speed;
        game.speed += 0.00028;
        game.completion = (game.scrollX / levelLength) * 100;
        updateProgress();

        const p = game.player;
        p.jumpBuffer = Math.max(0, p.jumpBuffer - 1);
        p.coyote = Math.max(0, p.coyote - 1);
        p.vy += game.gravity;
        p.y += p.vy;
        p.rotation += 0.06;

        const floor = groundY() - p.size / 2;
        if (p.y >= floor) {
          p.y = floor;
          p.vy = 0;
          p.rotation = 0;
          p.onGround = true;
          p.coyote = 7;
        } else {
          p.onGround = false;
        }

        if (p.jumpBuffer > 0 && (p.onGround || p.coyote > 0)) {
          performJump();
        }

        const bounds = playerBounds();

        for (const obs of game.obstacles) {
          const screenX = obs.x - game.scrollX;
          if (screenX + obs.w < -80 || screenX > w + 80) continue;

          if (obs.type === 'spike') {
            const box = { x: screenX + 10, y: groundY() - obs.h, w: obs.w - 20, h: obs.h - 2 };
            if (intersects(bounds, box)) {
              if (!practiceMode) fail();
              else {
                game.scrollX = Math.max(0, game.scrollX - 240);
                p.y = floor;
                p.vy = 0;
                p.rotation = 0;
                p.onGround = true;
                p.coyote = 7;
                game.flash = 0.16;
              }
              return;
            }
          } else {
            const box = { x: screenX, y: groundY() - obs.h, w: obs.w, h: obs.h };
            if (intersects(bounds, box)) {
              if (bounds.y + bounds.h - p.vy <= box.y + 14 && p.vy >= 0) {
                p.y = box.y - p.size / 2;
                p.vy = 0;
                p.rotation = 0;
                p.onGround = true;
                p.coyote = 7;
              } else {
                if (!practiceMode) fail();
                else {
                  game.scrollX = Math.max(0, game.scrollX - 240);
                  p.y = floor;
                  p.vy = 0;
                  p.rotation = 0;
                  p.onGround = true;
                  p.coyote = 7;
                  game.flash = 0.16;
                }
                return;
              }
            }
          }
        }

        for (const star of game.stars) {
          if (star.taken) continue;
          const sx = star.x - game.scrollX;
          const sy = groundY() + star.y;
          const box = { x: sx - 12, y: sy - 12, w: 24, h: 24 };
          if (intersects(bounds, box)) {
            star.taken = true;
            starSound();
            for (let i = 0; i < 8; i++) {
              game.particles.push({
                x: sx,
                y: sy,
                vx: -2 + Math.random() * 4,
                vy: -2 + Math.random() * 4,
                size: 3 + Math.random() * 3,
                a: 0.45 + Math.random() * 0.2,
                color: i % 2 === 0 ? colors.yellow : colors.cyan
              });
            }
          }
        }

        updateParticles();

        if (game.scrollX >= levelLength) {
          game.completion = 100;
          win();
        }
      }

      function drawBackground() {
        const dx = game.cameraShake > 0 ? (Math.random() - 0.5) * game.cameraShake : 0;
        const dy = game.cameraShake > 0 ? (Math.random() - 0.5) * game.cameraShake * 0.35 : 0;
        ctx.save();
        ctx.translate(dx, dy);

        const bg = ctx.createLinearGradient(0, 0, 0, h);
        bg.addColorStop(0, '#0d2236');
        bg.addColorStop(1, '#09131f');
        ctx.fillStyle = bg;
        ctx.fillRect(0, 0, w, h);

        for (const d of game.deco) {
          const x = (d.x - game.scrollX * 0.45) % (levelLength + 500);
          const drawX = x < -80 ? x + levelLength + 500 : x;
          ctx.fillStyle = d.color;
          ctx.globalAlpha = 0.14;
          ctx.fillRect(drawX, d.y, d.size, d.size);
          ctx.globalAlpha = 1;
        }

        const stripeOffset = -(game.scrollX * 0.35 % 52);
        ctx.strokeStyle = 'rgba(255,255,255,0.05)';
        ctx.lineWidth = 1;
        for (let x = stripeOffset; x < w + 52; x += 52) {
          ctx.beginPath();
          ctx.moveTo(x, 0);
          ctx.lineTo(x, h);
          ctx.stroke();
        }

        ctx.fillStyle = '#0f1827';
        ctx.fillRect(0, groundY(), w, h - groundY());
        ctx.fillStyle = 'rgba(46,230,255,0.35)';
        ctx.fillRect(0, groundY(), w, 4);
      }

      function drawObstacles() {
        for (const obs of game.obstacles) {
          const x = obs.x - game.scrollX;
          if (x + obs.w < -60 || x > w + 60) continue;

          if (obs.type === 'spike') {
            const y = groundY();
            ctx.beginPath();
            ctx.moveTo(x, y);
            ctx.lineTo(x + obs.w / 2, y - obs.h);
            ctx.lineTo(x + obs.w, y);
            ctx.closePath();
            const grad = ctx.createLinearGradient(x, y, x, y - obs.h);
            grad.addColorStop(0, colors.pink);
            grad.addColorStop(1, colors.yellow);
            ctx.fillStyle = grad;
            ctx.fill();
            ctx.strokeStyle = 'rgba(255,255,255,0.18)';
            ctx.stroke();
          } else {
            const y = groundY() - obs.h;
            const grad = ctx.createLinearGradient(x, y, x + obs.w, y + obs.h);
            grad.addColorStop(0, colors.cyan);
            grad.addColorStop(1, '#178cff');
            ctx.fillStyle = grad;
            ctx.fillRect(x, y, obs.w, obs.h);
            ctx.strokeStyle = 'rgba(255,255,255,0.2)';
            ctx.strokeRect(x + 0.5, y + 0.5, obs.w - 1, obs.h - 1);
          }
        }
      }

      function drawStars() {
        for (const star of game.stars) {
          if (star.taken) continue;
          const x = star.x - game.scrollX;
          const y = groundY() + star.y;
          if (x < -30 || x > w + 30) continue;
          ctx.save();
          ctx.translate(x, y);
          ctx.rotate(performance.now() * 0.002);
          ctx.fillStyle = colors.yellow;
          ctx.beginPath();
          for (let i = 0; i < 5; i++) {
            const a = (Math.PI * 2 * i) / 5 - Math.PI / 2;
            const ox = Math.cos(a) * 12;
            const oy = Math.sin(a) * 12;
            if (i === 0) ctx.moveTo(ox, oy);
            else ctx.lineTo(ox, oy);
            const ia = a + Math.PI / 5;
            ctx.lineTo(Math.cos(ia) * 5, Math.sin(ia) * 5);
          }
          ctx.closePath();
          ctx.fill();
          ctx.restore();
        }
      }

      function drawParticles() {
        for (const p of game.particles) {
          ctx.globalAlpha = p.a;
          ctx.fillStyle = p.color;
          ctx.fillRect(p.x, p.y, p.size, p.size);
          ctx.globalAlpha = 1;
        }
      }

      function drawPlayer() {
        ctx.save();
        ctx.translate(game.player.x, game.player.y);
        ctx.rotate(game.player.rotation);
        if (spriteLoaded && leo.naturalWidth > 0) {
          ctx.save();
          ctx.shadowColor = 'rgba(46,230,255,0.32)';
          ctx.shadowBlur = 16;
          ctx.drawImage(leo, -game.player.size / 2, -game.player.size / 2, game.player.size, game.player.size);
          ctx.restore();
        } else {
          ctx.fillStyle = colors.cyan;
          ctx.fillRect(-game.player.size / 2, -game.player.size / 2, game.player.size, game.player.size);
        }
        ctx.restore();
      }

      function drawFlash() {
        if (game.flash <= 0) return;
        ctx.fillStyle = `rgba(255,255,255,${game.flash})`;
        ctx.fillRect(0, 0, w, h);
      }

      function drawMenuBackdrop() {
        ctx.clearRect(0, 0, w, h);
        game.scrollX += 0.45;
        drawBackground();
        drawObstacles();
        drawStars();
        drawPlayer();
        drawFlash();
        ctx.restore();
      }

      function render() {
        ctx.clearRect(0, 0, w, h);
        drawBackground();
        drawObstacles();
        drawStars();
        drawParticles();
        drawPlayer();
        drawFlash();
        ctx.restore();
      }

      function frame() {
        update();
        if (game.running || game.ended) render();
        else drawMenuBackdrop();
        raf = requestAnimationFrame(frame);
      }

      function pressAction(e) {
        if (e) e.preventDefault();
        initAudio();
        if (game.running) queueJump();
      }

      window.addEventListener('resize', resize);
      window.addEventListener('keydown', (e) => {
        if (e.code === 'Space' || e.code === 'ArrowUp') {
          e.preventDefault();
          if (game.running) queueJump();
        }
      });
      window.addEventListener('pointerdown', () => {
        if (game.running) queueJump();
      });
      jumpBtn.addEventListener('click', pressAction);
      startBtn.addEventListener('click', () => start(false));
      practiceBtn.addEventListener('click', () => start(true));
      retryBtn.addEventListener('click', () => start(practiceMode));
      menuBtn.addEventListener('click', backToMenu);

      resize();
      buildLevel();
      bestText.textContent = `Best: ${best}%`;
      frame();
    })();
  </script>
</body>
</html>
